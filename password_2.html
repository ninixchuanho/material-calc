<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>詮禾材料系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 48px 40px 40px;
      width: 340px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 13px;
      letter-spacing: 4px;
      color: #4a9eff;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      color: #e0e6f0;
      font-weight: 600;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #7a8fab;
      letter-spacing: 1px;
      text-align: left;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #0f3460;
      border: 1px solid #1a4a7a;
      border-radius: 8px;
      color: #e0e6f0;
      font-size: 16px;
      letter-spacing: 3px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input[type="password"]:focus {
      border-color: #4a9eff;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #2d85f0; }
    button:active { transform: scale(0.98); }

    .error {
      margin-top: 16px;
      font-size: 13px;
      color: #ff6b6b;
      min-height: 18px;
      display: none;
    }

    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: #3a4a5a;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CHUANHO</div>
    <h1>材料單價系統</h1>

    <label>ACCESS PASSWORD</label>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="off" />

    <button onclick="check()">進入系統</button>
    <div class="error" id="err">密碼錯誤，請重新輸入</div>

    <div class="footer">詮禾工程 · 內部使用</div>
  </div>

  <script>
    // ★ 在這裡設定你的密碼 ★
    const PASSWORD = "sunho23403384";

    // 已登入的話直接跳過
    if (sessionStorage.getItem("chuanho_auth") === "ok") {
      location.replace("./index.html");
    }

    document.getElementById("pwd").addEventListener("keydown", function(e) {
      if (e.key === "Enter") check();
    });

    function check() {
      const val = document.getElementById("pwd").value;
      if (val === PASSWORD) {
        sessionStorage.setItem("chuanho_auth", "ok");
        location.replace("./index.html");
      } else {
        const err = document.getElementById("err");
        err.style.display = "block";
        document.getElementById("pwd").value = "";
        document.getElementById("pwd").focus();
        setTimeout(() => { err.style.display = "none"; }, 3000);
      }
    }
  </script>
</body>
</html>
